# Dev AI stack - audio: OpenAI-compatible (LocalAI TTS/STT) + Ollama (whisper)
services:
  openai-oss:
    image: localai/localai:latest-cpu
    container_name: olo-openai-oss-audio
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - THREADS=4
      - DEBUG=true
    volumes:
      - olo-dev-localai-audio-models:/models
      - olo-dev-localai-audio-cache:/cache
    networks:
      - olo-net

  ollama:
    image: ollama/ollama:latest
    container_name: olo-ollama-audio
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - olo-dev-ollama-audio-data:/root/.ollama
    networks:
      - olo-net

networks:
  olo-net:
    external: true
    name: olo-net

volumes:
  olo-dev-localai-audio-models:
  olo-dev-localai-audio-cache:
  olo-dev-ollama-audio-data:
