services:
  db:
    image: postgres:16-alpine
    container_name: olo-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=olo_dev
    ports:
      - "5432:5432"
    volumes:
      - olo-dev-db-data:/var/lib/postgresql/data
    networks:
      - olo-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: olo-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@local.dev
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - olo-net

networks:
  olo-net:
    external: true
    name: olo-net

volumes:
  olo-dev-db-data:
